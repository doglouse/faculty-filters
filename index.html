  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

         <div style=\"flex:1\"><\u002Fdiv>\n                <sc-if value=\"{{ item.showButton }}\" hint-placeholder-val=\"{{ true }}\">\n                  <button style=\"margin-top:18px;width:100%;background:#0b4a6f;color:#fff;border:none;border-radius:7px;padding:13px 16px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit\" style-hover=\"background:#0a3f5e\">Complete Form<\u002Fbutton>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ item.showReview }}\" hint-placeholder-val=\"{{ false }}\">\n                  <button style=\"margin-top:18px;width:100%;background:#fff;color:#0b4a6f;border:1px solid #cbd5e1;border-radius:7px;padding:13px 16px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit\" style-hover=\"background:#f8fafc\">Review Responses<\u002Fbutton>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ item.showBlockedNote }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"margin-top:18px;display:flex;align-items:center;gap:9px;background:#fdf3ee;border:1px solid #f6dccb;border-radius:7px;padding:11px 13px\">\n                    <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#c2410c\" stroke-width=\"2\" style=\"flex-shrink:0\"><path d=\"M12 2 2 20h20z\"><\u002Fpath><path d=\"M12 9v4\"><\u002Fpath><path d=\"M12 17h.01\"><\u002Fpath><\u002Fsvg>\n                    <span style=\"font-size:13.5px;color:#9a3412;line-height:1.4\">Complete your Financial Disclosures form to unlock this survey.<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ item.showDownload }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"margin-top:18px;border-top:1px solid #eef2f6;padding-top:14px;display:flex;justify-content:space-between;align-items:center\">\n                    <span style=\"font-size:14px;color:#64748b\">Signed {{ item.signed }}<\u002Fspan>\n                    <a href=\"#\" style=\"font-size:14px;color:#0b6bb0;text-decoration:underline;font-weight:500\">Download PDF<\u002Fa>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noResults }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"border:1px dashed #d6dee6;border-radius:12px;padding:64px 24px;text-align:center;color:#64748b\">\n            <svg width=\"42\" height=\"42\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#94a3b8\" stroke-width=\"1.5\" style=\"margin-bottom:14px\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"m20 20-3-3\"><\u002Fpath><\u002Fsvg>\n            <p style=\"margin:0 0 6px;font-size:17px;font-weight:600;color:#334155\">No documents match your filters<\u002Fp>\n            <p style=\"margin:0 0 18px;font-size:14px\">Try removing a filter or clearing all to see everything.<\u002Fp>\n            <button onclick=\"{{ clearAll }}\" style=\"background:#0b4a6f;color:#fff;border:none;border-radius:8px;padding:11px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit\">Clear all filters<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fsection>\n    <\u002Fdiv>\n  <\u002Fmain>\n\n  <!-- footer -->\n  <footer style=\"background:#0b4a6f;color:#fff;padding:54px 40px 40px;flex-shrink:0\">\n    <div style=\"max-width:1640px;margin:0 auto\">\n      <div class=\"pd-foot\" style=\"display:grid;grid-template-columns:1.3fr 1fr 1fr 1fr 1.1fr;gap:40px\">\n        <div>\n          <div style=\"font-size:26px;font-weight:700;letter-spacing:3px;margin-bottom:12px\">PR1ME<\u002Fdiv>\n          <div style=\"font-size:11px;letter-spacing:1px;color:#a9c6d8;margin-bottom:6px\">A PROPERTY OF<\u002Fdiv>\n          <div style=\"font-size:17px;font-weight:700;margin-bottom:18px\">EVERYDAY <span style=\"font-weight:400\">HEALTH<\u002Fspan> <span style=\"font-size:11px;vertical-align:middle\">GROUP<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:12px\">\n            <sc-for list=\"{{ socials }}\" as=\"s\" hint-placeholder-count=\"3\">\n              <span style=\"width:34px;height:34px;border:1px solid #3d6e8c;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:15px;font-weight:700\">{{ s }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:15px;font-weight:700;margin-bottom:16px\">PRIME<\u002Fdiv>\n          <sc-for list=\"{{ colPrime }}\" as=\"l\" hint-placeholder-count=\"8\"><a href=\"#\" style=\"display:block;font-size:14px;color:#cfe0ea;text-decoration:none;margin-bottom:11px;line-height:1.35\" style-hover=\"color:#fff\">{{ l }}<\u002Fa><\u002Fsc-for>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:15px;font-weight:700;margin-bottom:16px\">PRIME Network<\u002Fdiv>\n          <sc-for list=\"{{ colNetwork }}\" as=\"l\" hint-placeholder-count=\"4\"><a href=\"#\" style=\"display:block;font-size:14px;color:#cfe0ea;text-decoration:none;margin-bottom:11px\" style-hover=\"color:#fff\">{{ l }}<\u002Fa><\u002Fsc-for>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:15px;font-weight:700;margin-bottom:16px\">PRIME Corporate<\u002Fdiv>\n          <sc-for list=\"{{ colCorporate }}\" as=\"l\" hint-placeholder-count=\"5\"><a href=\"#\" style=\"display:block;font-size:14px;color:#cfe0ea;text-decoration:none;margin-bottom:11px\" style-hover=\"color:#fff\">{{ l }}<\u002Fa><\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;align-items:center;text-align:center\">\n          <div style=\"width:82px;height:82px;border-radius:999px;border:2px solid #cfe0ea;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:700;margin-bottom:10px\">A<\u002Fdiv>\n          <div style=\"font-size:10px;letter-spacing:.5px;color:#cfe0ea;line-height:1.5\">JOINTLY ACCREDITED PROVIDER™<br>WITH COMMENDATION<br><span style=\"color:#8fb2c8\">INTERPROFESSIONAL CONTINUING EDUCATION<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"text-align:center;margin-top:46px;font-size:13.5px;color:#a9c6d8;line-height:1.6\">\n        © 1997–2026 PRIME Education, LLC<br>360 Park Avenue South, 17th Floor, New York, NY 10010\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    f: { status: 'all', types: [], project: '', date: 'Any time', dateFrom: '', dateTo: '' },\n    typeMenuOpen: false,\n    dateMenuOpen: false,\n  };\n\n  ALL_TYPES = ['Statement of Work', 'Planning Survey', 'CME Review', 'Financial Disclosures', 'EBAC Financial Disclosures'];\n  DATES = ['Any time', 'Last 30 days', 'Last 90 days', 'This year', 'Last year'];\n  NOW = new Date('2026-06-24');\n\n  accountItems = [\n    { label: 'ACH Verification', warn: true, icon: '<path d=\"M9 12l2 2 4-4\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle>' },\n    { label: 'Direct Deposit', done: true, icon: '<rect x=\"3\" y=\"10\" width=\"18\" height=\"9\" rx=\"1\"><\u002Frect><path d=\"M3 10l9-6 9 6\"><\u002Fpath><path d=\"M7 14h2\"><\u002Fpath>' },\n    { label: 'Master Agreement', warn: true, icon: '<path d=\"M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z\"><\u002Fpath><path d=\"M14 3v5h5\"><\u002Fpath><path d=\"M9 13l2 2 4-4\"><\u002Fpath>' },\n    { label: 'Preferences', warn: true, icon: '<circle cx=\"9\" cy=\"8\" r=\"3\"><\u002Fcircle><path d=\"M4 20a5 5 0 0 1 10 0\"><\u002Fpath><circle cx=\"17\" cy=\"9\" r=\"2\"><\u002Fcircle><path d=\"M14.5 20a4 4 0 0 1 6.5-3\"><\u002Fpath>' },\n    { label: 'W-9', warn: true, icon: '<path d=\"M4 21h16\"><\u002Fpath><path d=\"M5 21V8l7-5 7 5v13\"><\u002Fpath><path d=\"M9 21v-6h6v6\"><\u002Fpath>' },\n  ];\n\n  projects = [\n    'Detecting Hidradenitis Suppurativa: Bringing the Patient\\u2019s Voice to the Forefront',\n    'Strengthening Minds, Strengthening Care: Mental Health and Support in Sickle Cell Disease',\n    'From Evidence to Action: A Multimodal Learning Initiative to Advance Perioperative Pain Management and Opioid Stewardship',\n    'An Expert TheraTalk on the Next Wave in Psoriasis Treatment: From Mechanistic Pathways to Clinical Practice',\n  ];\n\n  DOCS = [\n    { type: 'Statement of Work', project: this_p(0), statusKey: 'pending', statusPending: true, showButton: true },\n    { type: 'Planning Survey', project: this_p(0), statusKey: 'pending', statusBlocked: true, showBlockedNote: true },\n    { type: 'CME Review', project: this_p(0), statusKey: 'pending', statusPending: true, showButton: true },\n    { type: 'Financial Disclosures', project: this_p(0), statusKey: 'pending', statusPending: true, showButton: true },\n    { type: 'Statement of Work', project: this_p(1), statusKey: 'pending', statusPending: true, showButton: true },\n    { type: 'Statement of Work', project: this_p(1), statusKey: 'complete', statusComplete: true, showDownload: true, signed: 'Mar 15, 2025', date: '2025-03-15' },\n    { type: 'Statement of Work', project: this_p(2), statusKey: 'complete', statusComplete: true, showDownload: true, signed: 'Sep 6, 2024', date: '2024-09-06' },\n    { type: 'Planning Survey', project: this_p(2), statusKey: 'complete', statusComplete: true, showReview: true, date: '2024-09-12' },\n    { type: 'EBAC Financial Disclosures', project: this_p(3), statusKey: 'complete', statusComplete: true, showDownload: true, signed: 'Apr 19, 2024', date: '2024-04-19' },\n    { type: 'Statement of Work', project: this_p(3), statusKey: 'complete', statusComplete: true, showDownload: true, signed: 'Apr 19, 2024', date: '2024-04-19' },\n  ];\n\n  componentDidMount() {\n    document.title = 'Project Documents';\n    if (this._heading) this._heading.focus();\n    this._onDocDown = (e) => {\n      if (!this.state.typeMenuOpen && !this.state.dateMenuOpen) return;\n      if (e.target.closest && e.target.closest('[data-dropdown]')) return;\n      this.setState({ typeMenuOpen: false, dateMenuOpen: false });\n    };\n    document.addEventListener('mousedown', this._onDocDown);\n  }\n  componentWillUnmount() {\n    if (this._onDocDown) document.removeEventListener('mousedown', this._onDocDown);\n  }\n\n  upd(patch) { this.setState(s => ({ f: { ...s.f, ...patch } })); }\n  toggleType(t) {\n    const cur = this.state.f.types;\n    this.upd({ types: cur.includes(t) ? cur.filter(x => x !== t) : [...cur, t] });\n  }\n  clear() { this.setState(s => ({ f: { ...s.f, types: [], project: '', date: 'Any time', dateFrom: '', dateTo: '' }, typeMenuOpen: false, dateMenuOpen: false })); }\n\n  setPreset(p) { this.upd({ date: p, dateFrom: '', dateTo: '' }); this.setState({ dateMenuOpen: false }); }\n\n  matchDate(d) {\n    const f = this.state.f;\n    if (f.date === 'Any time') return true;\n    if (!d.date) return true; // pending/active items always pass date\n    const dt = new Date(d.date);\n    if (f.date === 'custom') {\n      if (f.dateFrom && dt < new Date(f.dateFrom)) return false;\n      if (f.dateTo && dt > new Date(f.dateTo)) return false;\n      return true;\n    }\n    if (f.date === 'Last 30 days') return (this.NOW - dt) <= 30 * 864e5;\n    if (f.date === 'Last 90 days') return (this.NOW - dt) <= 90 * 864e5;\n    if (f.date === 'This year') return dt.getFullYear() === 2026;\n    if (f.date === 'Last year') return dt.getFullYear() === 2025;\n    return true;\n  }\n\n  fmtShort(iso) {\n    if (!iso) return '';\n    const m = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];\n    const p = iso.split('-');\n    return m[+p[1] - 1] + ' ' + (+p[2]);\n  }\n  dateLabelText() {\n    const f = this.state.f;\n    if (f.date === 'custom') {\n      if (f.dateFrom || f.dateTo) return (this.fmtShort(f.dateFrom) || 'Any') + ' – ' + (this.fmtShort(f.dateTo) || 'Any');\n      return 'Custom range';\n    }\n    return f.date === 'Any time' ? 'Date' : f.date;\n  }\n  dateActive() {\n    const f = this.state.f;\n    return f.date === 'custom' ? !!(f.dateFrom || f.dateTo) : f.date !== 'Any time';\n  }\n  filtered() {\n    const f = this.state.f;\n    return this.DOCS.filter(d => {\n      if (f.status !== 'all' && d.statusKey !== f.status) return false;\n      if (f.types.length && !f.types.includes(d.type)) return false;\n      if (f.project && d.project !== f.project) return false;\n      if (!this.matchDate(d)) return false;\n      return true;\n    });\n  }\n\n  shortType(t) { return t === 'EBAC Financial Disclosures' ? 'EBAC Fin. Disclosures' : t === 'Financial Disclosures' ? 'Fin. Disclosures' : t; }\n  shortProject(p) { return p.length > 32 ? p.slice(0, 30) + '\\u2026' : p; }\n  pendingCount() { return this.DOCS.filter(d => d.statusKey === 'pending').length; }\n\n  tabStyle(active) {\n    const base = 'background:none;border:none;border-radius:0;padding:10px 4px;font-size:15px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;';\n    return active\n      ? base + 'color:#15629e;font-weight:600;box-shadow:inset 0 -2px 0 #15629e;'\n      : base + 'color:#6b7280;font-weight:500;box-shadow:none;';\n  }\n  checkbox(active) {\n    const base = 'flex-shrink:0;width:19px;height:19px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;';\n    return active ? base + 'background:#0b4a6f;border:1px solid #0b4a6f;' : base + 'background:#fff;border:1px solid #cbd5e1;';\n  }\n\n  buildActiveChips() {\n    const f = this.state.f, chips = [];\n    f.types.forEach(t => chips.push({ label: this.shortType(t), onRemove: () => this.toggleType(t) }));\n    if (f.project) chips.push({ label: this.shortProject(f.project), onRemove: () => this.upd({ project: '' }) });\n    if (this.dateActive()) chips.push({ label: this.dateLabelText(), onRemove: () => this.upd({ date: 'Any time', dateFrom: '', dateTo: '' }) });\n    return chips;\n  }\n  hasFilters() {\n    const f = this.state.f;\n    return f.types.length > 0 || !!f.project || this.dateActive();\n  }\n\n  renderVals() {\n    const f = this.state.f;\n    const cards = this.filtered();\n    return {\n      accountItems: this.accountItems,\n      projects: this.projects,\n      datePresets: this.DATES,\n      socials: ['in', '\\uD835\\uDD4F', 'f'],\n      colPrime: ['About PRIME', 'Privacy Policy', 'Terms of Use', 'Contact PRIME', 'Accessibility Statement', 'Privacy Preferences', 'Do Not Sell My Personal Information', 'All Upcoming Events'],\n      colNetwork: ['CMEToolkit.com', 'MilitaryCME.com', 'ManagedCare.network', 'AfterMD.com'],\n      colCorporate: ['Our Work', 'Awards', 'Publications', 'Press', 'Careers'],\n\n      headingRef: (el) => { this._heading = el; },\n      f,\n      statusTabs: [\n        { key: 'all', label: 'All' },\n        { key: 'pending', label: 'Pending', showCount: true, count: this.pendingCount() },\n        { key: 'complete', label: 'Complete' },\n      ].map(t => ({ ...t, style: this.tabStyle(f.status === t.key), showCount: !!t.showCount, onClick: () => this.upd({ status: t.key }) })),\n\n      typeMenu: this.ALL_TYPES.map(t => ({ label: t, checked: f.types.includes(t), box: this.checkbox(f.types.includes(t)), onClick: (e) => { if (e && e.preventDefault) e.preventDefault(); this.toggleType(t); } })),\n      typeMenuOpen: this.state.typeMenuOpen,\n      toggleTypeMenu: () => this.setState(s => ({ typeMenuOpen: !s.typeMenuOpen, dateMenuOpen: false })),\n      typeCount: f.types.length,\n      typeBtnStyle: 'display:inline-flex;align-items:center;gap:8px;border:1px solid ' + (f.types.length ? '#0b4a6f' : '#cbd5e1') + ';background:#fff;color:' + (f.types.length ? '#0b4a6f' : '#475569') + ';border-radius:8px;padding:11px 15px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit',\n\n      onProject: (e) => this.upd({ project: e.target.value }),\n      dateMenuOpen: this.state.dateMenuOpen,\n      toggleDateMenu: () => this.setState(s => ({ dateMenuOpen: !s.dateMenuOpen, typeMenuOpen: false })),\n      dateLabel: this.dateLabelText(),\n      dateBtnStyle: 'display:inline-flex;align-items:center;gap:8px;border:1px solid ' + (this.dateActive() ? '#0b4a6f' : '#cbd5e1') + ';background:#fff;color:' + (this.dateActive() ? '#0b4a6f' : '#475569') + ';border-radius:8px;padding:11px 15px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit',\n      dateMenu: this.DATES.map(d => {\n        const active = this.state.f.date === d;\n        return {\n          label: d,\n          onClick: () => this.setPreset(d),\n          style: 'display:flex;align-items:center;gap:11px;width:100%;padding:9px 10px;border:none;border-radius:7px;cursor:pointer;font-size:14.5px;font-family:inherit;text-align:left;background:' + (active ? '#eef3f7' : 'transparent') + ';color:' + (active ? '#0b4a6f' : '#334155') + ';font-weight:' + (active ? '600' : '400') + ';',\n          dot: 'flex-shrink:0;width:16px;height:16px;border-radius:999px;display:inline-block;border:' + (active ? '5px solid #0b4a6f' : '1px solid #cbd5e1') + ';box-sizing:border-box;',\n        };\n      }),\n      onDateFrom: (e) => this.upd({ date: 'custom', dateFrom: e.target.value }),\n      onDateTo: (e) => this.upd({ date: 'custom', dateTo: e.target.value }),\n\n      hasFilters: this.hasFilters(),\n      activeChips: this.buildActiveChips(),\n      clearAll: () => this.clear(),\n      count: cards.length,\n      cards,\n      hasResults: cards.length > 0,\n      noResults: cards.length === 0,\n    };\n  }\n}\n\nfunction this_p(i) {\n  return ['Detecting Hidradenitis Suppurativa: Bringing the Patient\\u2019s Voice to the Forefront', 'Strengthening Minds, Strengthening Care: Mental Health and Support in Sickle Cell Disease', 'From Evidence to Action: A Multimodal Learning Initiative to Advance Perioperative Pain Management and Opioid Stewardship', 'An Expert TheraTalk on the Next Wave in Psoriasis Treatment: From Mechanistic Pathways to Clinical Practice'][i];\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
